<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PrimeAI - Login</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #1e293b;
    }

    .container {
      width: 100%;
      max-width: 400px;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .header {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo {
      font-size: 48px;
      margin-bottom: 12px;
    }

    .title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 14px;
      color: #64748b;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 12px;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      font-size: 14px;
      transition: border-color 0.2s;
    }

    input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 14px;
      margin-top: 8px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }

    .btn-secondary {
      background: #f1f5f9;
      color: #1e293b;
    }

    .btn-secondary:hover {
      background: #e2e8f0;
    }

    .toggle-form {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      color: #64748b;
    }

    .toggle-form button {
      background: none;
      border: none;
      color: #667eea;
      font-weight: 600;
      cursor: pointer;
      text-decoration: underline;
      margin-left: 4px;
    }

    .alert {
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 16px;
      font-size: 13px;
    }

    .alert-success {
      background: #dcfce7;
      color: #166534;
      border: 1px solid #bbf7d0;
    }

    .alert-error {
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }

    .form-section {
      display: none;
    }

    .form-section.active {
      display: block;
    }

    .loading {
      display: none;
      text-align: center;
      color: #64748b;
      font-size: 14px;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #f1f5f9;
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .trial-badge {
      background: #dbeafe;
      color: #1e40af;
      padding: 8px;
      border-radius: 4px;
      text-align: center;
      margin-top: 12px;
      font-size: 12px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="header">
        <div class="logo">🛡️</div>
        <div class="title">PrimeAI</div>
        <div class="subtitle">Interview Shield</div>
      </div>

      <div id="alerts"></div>

      <!-- Login Form -->
      <div id="loginForm" class="form-section active">
        <form onsubmit="handleLogin(event)">
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="login-email" placeholder="you@example.com" required>
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="login-password" placeholder="••••••••" required>
          </div>
          <button type="submit" class="btn btn-primary">Sign In</button>
          <button type="button" class="btn btn-secondary" onclick="switchForm('register')">Create Account</button>
        </form>
      </div>

      <!-- Register Form -->
      <div id="registerForm" class="form-section">
        <form onsubmit="handleRegister(event)">
          <div class="form-group">
            <label>Username</label>
            <input type="text" id="register-username" placeholder="john_dev" required>
          </div>
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="register-email" placeholder="you@example.com" required>
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="register-password" placeholder="••••••••" minlength="8" required>
          </div>
          <button type="submit" class="btn btn-primary">Create Account</button>
          <button type="button" class="btn btn-secondary" onclick="switchForm('login')">Sign In Instead</button>
          <div class="trial-badge">
            ✅ Get 1 day free trial on signup!
          </div>
        </form>
      </div>

      <div class="toggle-form" id="toggleForm">
        Don't have an account?
        <button type="button" onclick="switchForm('register')">Sign Up</button>
      </div>
    </div>
  </div>

  <script>
    const API_URL = 'http://localhost:8000/api';

    function switchForm(formType) {
      document.getElementById('loginForm').classList.toggle('active');
      document.getElementById('registerForm').classList.toggle('active');
      document.getElementById('alerts').innerHTML = '';
    }

    async function handleLogin(event) {
      event.preventDefault();
      
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;

      try {
        const response = await fetch(`${API_URL}/auth/login`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (response.ok) {
          localStorage.setItem('authToken', data.access_token);
          showAlert('Login successful! Redirecting...', 'success');
          setTimeout(() => {
            window.location.href = 'index.html';
          }, 1000);
        } else {
          showAlert(data.detail || 'Login failed', 'error');
        }
      } catch (error) {
        showAlert('Connection error. Please try again.', 'error');
      }
    }

    async function handleRegister(event) {
      event.preventDefault();
      
      const username = document.getElementById('register-username').value;
      const email = document.getElementById('register-email').value;
      const password = document.getElementById('register-password').value;

      try {
        const response = await fetch(`${API_URL}/auth/register`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ username, email, password })
        });

        const data = await response.json();

        if (response.ok) {
          localStorage.setItem('authToken', data.access_token);
          showAlert('Account created! Starting 1-day free trial...', 'success');
          setTimeout(() => {
            window.location.href = 'index.html';
          }, 1500);
        } else {
          showAlert(data.detail || 'Registration failed', 'error');
        }
      } catch (error) {
        showAlert('Connection error. Please try again.', 'error');
      }
    }

    function showAlert(message, type = 'info') {
      const alertsDiv = document.getElementById('alerts');
      const alert = document.createElement('div');
      alert.className = `alert alert-${type}`;
      alert.textContent = message;
      alertsDiv.appendChild(alert);
      
      if (type === 'error') {
        setTimeout(() => alert.remove(), 5000);
      }
    }
  </script>
</body>
</html>
