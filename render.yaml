services:
  - type: web
    name: primeai-backend
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python -m uvicorn app.main:app --host 0.0.0.0 --port 8000"
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
    rootDir: backend

databases:
  - name: primeai-postgres
    plan: free
    databaseName: primeai
    user: primeai
    region: oregon
